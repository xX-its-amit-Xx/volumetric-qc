name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src tests

      - name: Black format check
        run: black --check src tests

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=src/volumetric_qc \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=75

      - name: Upload coverage XML
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  build-docker:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4

      - name: Build docker image
        run: docker build -t volumetric-qc:ci .

      - name: Smoke-test CLI
        run: |
          docker run --rm volumetric-qc:ci --help
          docker run --rm volumetric-qc:ci presets

      - name: Smoke-test demo pipeline
        run: |
          mkdir -p output
          docker run --rm -v "$PWD/output:/output" \
            --entrypoint python volumetric-qc:ci scripts/generate_demo_dashboard.py
          test -f output/qc_dashboard.html
          test -f output/qc_summary.json
